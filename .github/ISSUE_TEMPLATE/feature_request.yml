name: Feature request
description: Suggest a new command, flag, or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that bronto doesn't support (well)?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the command/flag look like? (`bronto api <method> <path>` may already cover it — see README.)
