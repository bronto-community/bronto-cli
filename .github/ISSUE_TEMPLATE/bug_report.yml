name: Bug report
description: Something broke or behaves unexpectedly
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `bronto --version`
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you run, what did you expect, what did you get? Include the full command and output (redact API keys).
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, install method (release archive / go install / docker), region.
