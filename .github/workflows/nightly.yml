name: Nightly

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # integration-nightly runs the same black-box suite as ci.yml's
  # `integration` job, unattended and on its own schedule: it doubles as an
  # API-drift and dead-key detector (per the plan) even on days with no PRs,
  # and gives the eventual-consistency poll a longer budget
  # (BRONTO_IT_NIGHTLY=1 -> 10 minutes instead of 3 — see seedPollBudget in
  # integration/seed_test.go) since nothing here is blocking a PR merge.
  integration-nightly:
    runs-on: ubuntu-latest
    environment: bronto-it
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          # Same audit-mode-during-burn-in posture as ci.yml's `integration`
          # job; see that job's comment for the full rationale and the
          # exports --download presigned-URL trap.
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Build instrumented binary
        run: go build -cover -covermode=atomic -coverpkg=./... -o bronto.itest ./cmd/bronto

      - name: Run integration suite
        env:
          BRONTO_IT_BIN: ${{ github.workspace }}/bronto.itest
          GOCOVERDIR: ${{ github.workspace }}/covdata/int
          BRONTO_IT_NIGHTLY: "1"
          BRONTO_IT_MGMT_KEY: ${{ secrets.BRONTO_IT_MGMT_KEY }}
          BRONTO_IT_INGEST_KEY: ${{ secrets.BRONTO_IT_INGEST_KEY }}
          BRONTO_IT_REGION: ${{ vars.BRONTO_IT_REGION || 'eu' }}
        run: |
          mkdir -p "$GOCOVERDIR"
          # -timeout 20m: matches ci.yml — the live export leg runs ~8m,
          # too close to go test's default 10m package alarm.
          go test -count=1 -timeout 20m ./integration/

      # Keep artifacts on failure (and always, for consistency with ci.yml):
      # a failed nightly run is exactly the "API drift / dead key" signal
      # this job exists to catch, and the covdata + any test output are the
      # first thing to look at.
      - name: Upload integration covdata
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-nightly-covdata
          path: covdata/int
          if-no-files-found: warn

  vuln-nightly:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - run: make vuln
