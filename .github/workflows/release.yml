name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release + upload assets
  packages: write # push images to ghcr
  id-token: write # cosign keyless signing (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          # Audit during the same burn-in window as ci.yml's integration job;
          # this is the most credential-sensitive workflow, so it flips to
          # block first once the egress list is confirmed.
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # Pin the TOOL, not just the installer action: the unpinned
          # 'latest' broke the v0.2.0 release when cosign v3 changed
          # sign-blob to require --bundle. v2.6.x produces the .sig/.pem
          # outputs our goreleaser signs block and SECURITY.md verification
          # depend on. Migrating to the v3 bundle format is deliberate
          # future work (goreleaser args + SECURITY.md together).
          cosign-release: "v2.6.0"

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stage docker build context
        # The image builds COPY these prebuilt binaries (goreleaser just
        # cross-compiled them natively) instead of compiling inside the
        # Dockerfile — in-image compilation ran under QEMU for arm64 and
        # cost ~8-10 minutes per release.
        run: |
          install -D dist/bronto_linux_amd64*/bronto docker-ctx/linux/amd64/bronto
          install -D dist/bronto_linux_arm64*/bronto docker-ctx/linux/arm64/bronto

      - name: Set image build metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SCRATCH_TAGS="ghcr.io/bronto-community/bronto-cli:${VERSION}"
          DISTROLESS_TAGS="ghcr.io/bronto-community/bronto-cli:${VERSION}-distroless"
          # Only stable releases (no pre-release suffix like -rc.1) move :latest.
          case "$GITHUB_REF_NAME" in
            *-*) ;;
            *)
              SCRATCH_TAGS="${SCRATCH_TAGS}"$'\n'"ghcr.io/bronto-community/bronto-cli:latest"
              DISTROLESS_TAGS="${DISTROLESS_TAGS}"$'\n'"ghcr.io/bronto-community/bronto-cli:latest-distroless"
              ;;
          esac
          {
            echo "version=${VERSION}"
            echo "commit=${GITHUB_SHA}"
            echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "scratch_tags<<TAGS_$GITHUB_SHA"
            echo "$SCRATCH_TAGS"
            echo "TAGS_$GITHUB_SHA"
            echo "distroless_tags<<TAGS_$GITHUB_SHA"
            echo "$DISTROLESS_TAGS"
            echo "TAGS_$GITHUB_SHA"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (scratch image)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: docker-ctx
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
          tags: ${{ steps.meta.outputs.scratch_tags }}
          provenance: true
          sbom: true

      - name: Build and push (distroless image)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: docker-ctx
          file: Dockerfile.distroless
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
          tags: ${{ steps.meta.outputs.distroless_tags }}
          provenance: true
          sbom: true
