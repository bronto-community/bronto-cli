name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image build metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SCRATCH_TAGS="ghcr.io/bronto-community/bronto-cli:${VERSION}"
          DISTROLESS_TAGS="ghcr.io/bronto-community/bronto-cli:${VERSION}-distroless"
          # Only stable releases (no pre-release suffix like -rc.1) move :latest.
          case "$GITHUB_REF_NAME" in
            *-*) ;;
            *)
              SCRATCH_TAGS="${SCRATCH_TAGS}"$'\n'"ghcr.io/bronto-community/bronto-cli:latest"
              DISTROLESS_TAGS="${DISTROLESS_TAGS}"$'\n'"ghcr.io/bronto-community/bronto-cli:latest-distroless"
              ;;
          esac
          {
            echo "version=${VERSION}"
            echo "commit=${GITHUB_SHA}"
            echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "scratch_tags<<TAGS_$GITHUB_SHA"
            echo "$SCRATCH_TAGS"
            echo "TAGS_$GITHUB_SHA"
            echo "distroless_tags<<TAGS_$GITHUB_SHA"
            echo "$DISTROLESS_TAGS"
            echo "TAGS_$GITHUB_SHA"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (scratch image)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            DATE=${{ steps.meta.outputs.date }}
          tags: ${{ steps.meta.outputs.scratch_tags }}

      - name: Build and push (distroless image)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.distroless
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            DATE=${{ steps.meta.outputs.date }}
          tags: ${{ steps.meta.outputs.distroless_tags }}
