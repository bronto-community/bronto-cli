# Watches the published Bronto OpenAPI spec and raises (or updates) a GitHub
# issue when it drifts from the upstream state our vendored api/openapi.yaml
# was built from. Deliberately does NOT touch api/openapi.yaml: the vendored
# spec carries hand-applied patches (grep "bronto-cli vendor patch"), so a
# human re-vendors, re-patches, regenerates, and updates api/upstream.sha256.
name: Spec sync

on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  SPEC_URL: ${{ vars.SPEC_URL || 'https://s3.eu-west-1.amazonaws.com/docs.brontobytes.io/redocusaurus/brontobytes.yaml' }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Fetch upstream spec
        run: curl -fsSL -o /tmp/upstream.yaml "$SPEC_URL"

      - name: Compare against vendored baseline
        id: compare
        run: |
          UPSTREAM_SHA=$(sha256sum /tmp/upstream.yaml | cut -d' ' -f1)
          BASELINE_SHA=$(cut -d' ' -f1 < api/upstream.sha256)
          echo "upstream_sha=${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"
          if [ "$UPSTREAM_SHA" = "$BASELINE_SHA" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Upstream spec unchanged (sha ${UPSTREAM_SHA})."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@v7
        if: steps.compare.outputs.changed == 'true'
        with:
          go-version-file: go.mod

      - name: Breaking-change report (oasdiff, informational)
        if: steps.compare.outputs.changed == 'true'
        run: |
          go run github.com/oasdiff/oasdiff@latest breaking api/openapi.yaml /tmp/upstream.yaml \
            > /tmp/oasdiff.txt 2>&1 || true
          # Indented (not fenced) so report content can never break the
          # issue's markdown; truncated to keep the issue readable.
          head -c 6000 /tmp/oasdiff.txt | sed 's/^/    /' > /tmp/oasdiff.md
          if [ "$(wc -c < /tmp/oasdiff.txt)" -gt 6000 ]; then
            printf '\n    … report truncated; run oasdiff locally for the full output.\n' >> /tmp/oasdiff.md
          fi

      - name: Create or update the drift issue
        if: steps.compare.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_SHA: ${{ steps.compare.outputs.upstream_sha }}
        run: |
          SHORT_SHA=$(printf '%s' "$UPSTREAM_SHA" | cut -c1-12)
          # shellcheck disable=SC2016 # single-quoted backticks below are markdown, not command substitution
          {
            printf '<!-- spec-sync:sha256=%s -->\n\n' "$UPSTREAM_SHA"
            printf 'The published Bronto OpenAPI spec has drifted from the state our vendored `api/openapi.yaml` was built from.\n\n'
            printf -- '- Upstream: %s\n' "$SPEC_URL"
            printf -- '- Upstream sha256: `%s`\n' "$UPSTREAM_SHA"
            printf -- '- Recorded baseline: `%s`\n\n' "$(cat api/upstream.sha256)"
            printf 'To re-vendor:\n\n'
            printf -- '- [ ] Download the upstream spec over `api/openapi.yaml`\n'
            printf -- '- [ ] Re-apply the hand patches (`grep -n "bronto-cli vendor patch" git history / previous spec`)\n'
            printf -- '- [ ] `make generate && go test ./...` (resource conformance test guards drift)\n'
            printf -- '- [ ] Update `api/upstream.sha256` to `%s <date>`\n\n' "$UPSTREAM_SHA"
            printf 'Breaking-change report (upstream vs. vendored, informational):\n\n'
            cat /tmp/oasdiff.md
          } > /tmp/issue-body.md

          gh label create spec-sync --repo "$GITHUB_REPOSITORY" \
            --description "Upstream OpenAPI spec drift" --color BFD4F2 2>/dev/null || true

          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --label spec-sync \
            --state open --json number --jq '.[0].number // empty')
          TITLE="Upstream OpenAPI spec changed (sha ${SHORT_SHA})"

          if [ -z "$EXISTING" ]; then
            gh issue create --repo "$GITHUB_REPOSITORY" --label spec-sync \
              --title "$TITLE" --body-file /tmp/issue-body.md
          elif gh issue view "$EXISTING" --repo "$GITHUB_REPOSITORY" --json body --jq .body \
              | grep -q "spec-sync:sha256=${UPSTREAM_SHA}"; then
            echo "::notice::Open issue #${EXISTING} already reports sha ${SHORT_SHA}; nothing to do."
          else
            gh issue edit "$EXISTING" --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" --body-file /tmp/issue-body.md
            gh issue comment "$EXISTING" --repo "$GITHUB_REPOSITORY" \
              --body "Upstream changed again; issue body refreshed for sha \`${SHORT_SHA}\`."
          fi
