# Watches the published Bronto OpenAPI spec and raises (or updates) a GitHub
# issue when it drifts from the upstream state our vendored api/openapi.yaml
# was built from. Deliberately does NOT touch api/openapi.yaml: the vendored
# spec carries hand-applied patches (grep "bronto-cli vendor patch"), so a
# human re-vendors, re-patches, regenerates, and updates api/upstream.sha256.
name: Spec sync

on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  SPEC_URL: ${{ vars.SPEC_URL || 'https://s3.eu-west-1.amazonaws.com/docs.brontobytes.io/redocusaurus/brontobytes.yaml' }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Fetch upstream spec
        run: curl -fsSL -o /tmp/upstream.yaml "$SPEC_URL"

      - name: Compare against vendored baseline
        id: compare
        run: |
          UPSTREAM_SHA=$(sha256sum /tmp/upstream.yaml | cut -d' ' -f1)
          BASELINE_SHA=$(cut -d' ' -f1 < api/upstream.sha256)
          echo "upstream_sha=${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"
          if [ "$UPSTREAM_SHA" = "$BASELINE_SHA" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Upstream spec unchanged (sha ${UPSTREAM_SHA})."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        if: steps.compare.outputs.changed == 'true'
        with:
          go-version-file: go.mod

      - name: Build change digest (oasdiff)
        if: steps.compare.outputs.changed == 'true'
        env:
          # setup-go@v7 pins GOTOOLCHAIN=local, which makes `go run` of a
          # newer oasdiff fail outright when it requires a newer Go than
          # go.mod's (seen in #10: "requires go >= 1.26 (running go
          # 1.25.0; GOTOOLCHAIN=local)" and an empty digest). auto restores
          # the toolchain auto-switch for this step only.
          GOTOOLCHAIN: auto
        run: |
          # stderr (Go toolchain/module downloads) goes to a log, NOT into
          # the report — it used to fill the issue with "go: downloading"
          # noise. Both commands are best-effort: spec-digest.sh degrades
          # gracefully on missing/invalid JSON.
          go run github.com/oasdiff/oasdiff@v1.25.1 diff api/openapi.yaml /tmp/upstream.yaml -f json \
            > /tmp/oasdiff-diff.json 2> /tmp/oasdiff-stderr.log || true
          go run github.com/oasdiff/oasdiff@v1.25.1 breaking api/openapi.yaml /tmp/upstream.yaml -f json \
            > /tmp/oasdiff-breaking.json 2>> /tmp/oasdiff-stderr.log || true
          # CLI endpoint inventory: lets the digest classify spec changes
          # by impact on bronto commands (new-and-uncovered / removed-but-
          # used / modified-backing-a-command).
          go run ./internal/tools/endpointmap \
            > /tmp/cli-endpoints.json 2>> /tmp/oasdiff-stderr.log || true
          scripts/spec-digest.sh /tmp/oasdiff-diff.json /tmp/oasdiff-breaking.json /tmp/oasdiff.md /tmp/cli-endpoints.json
          # GitHub issue bodies cap at 65536 chars; leave room for the
          # surrounding body text.
          if [ "$(wc -c < /tmp/oasdiff.md)" -gt 55000 ]; then
            head -c 55000 /tmp/oasdiff.md > /tmp/oasdiff.md.tmp
            printf '\n\n_…digest truncated; the full oasdiff JSON is in the workflow run artifacts._\n' >> /tmp/oasdiff.md.tmp
            mv /tmp/oasdiff.md.tmp /tmp/oasdiff.md
          fi

      - name: Upload full oasdiff output
        if: steps.compare.outputs.changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: oasdiff-report
          path: |
            /tmp/oasdiff-diff.json
            /tmp/oasdiff-breaking.json
            /tmp/cli-endpoints.json
            /tmp/oasdiff-stderr.log
          retention-days: 30

      - name: Create or update the drift issue
        if: steps.compare.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_SHA: ${{ steps.compare.outputs.upstream_sha }}
        run: |
          SHORT_SHA=$(printf '%s' "$UPSTREAM_SHA" | cut -c1-12)
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          # The marker carries a report-format version (v2 = digest format):
          # bumping it makes the workflow refresh an open issue that still
          # has an old-format body even when the upstream sha is unchanged.
          # shellcheck disable=SC2016 # single-quoted backticks below are markdown, not command substitution
          {
            printf '<!-- spec-sync:v2:sha256=%s -->\n\n' "$UPSTREAM_SHA"
            printf 'The published Bronto OpenAPI spec has drifted from the state our vendored `api/openapi.yaml` was built from.\n\n'
            printf -- '- Upstream: %s\n' "$SPEC_URL"
            printf -- '- Upstream sha256: `%s`\n' "$UPSTREAM_SHA"
            printf -- '- Recorded baseline: `%s`\n' "$(cat api/upstream.sha256)"
            printf -- '- Full machine-readable diff: [workflow run artifacts](%s)\n\n' "$RUN_URL"
            printf 'To re-vendor:\n\n'
            printf -- '- [ ] Download the upstream spec over `api/openapi.yaml`\n'
            printf -- '- [ ] Re-apply the hand patches (`grep -n "bronto-cli vendor patch" git history / previous spec`)\n'
            printf -- '- [ ] `make spec-baseline && go test ./...` (records the new vendored digest; the resource conformance test guards drift)\n'
            printf -- '- [ ] Update `api/upstream.sha256` to `%s <date>`\n\n' "$UPSTREAM_SHA"
            cat /tmp/oasdiff.md
          } > /tmp/issue-body.md

          gh label create spec-sync --repo "$GITHUB_REPOSITORY" \
            --description "Upstream OpenAPI spec drift" --color BFD4F2 2>/dev/null || true

          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --label spec-sync \
            --state open --json number --jq '.[0].number // empty')
          TITLE="Upstream OpenAPI spec changed (sha ${SHORT_SHA})"

          if [ -z "$EXISTING" ]; then
            gh issue create --repo "$GITHUB_REPOSITORY" --label spec-sync \
              --title "$TITLE" --body-file /tmp/issue-body.md
          elif gh issue view "$EXISTING" --repo "$GITHUB_REPOSITORY" --json body --jq .body \
              | grep -q "spec-sync:v2:sha256=${UPSTREAM_SHA}"; then
            echo "::notice::Open issue #${EXISTING} already reports sha ${SHORT_SHA}; nothing to do."
          else
            gh issue edit "$EXISTING" --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" --body-file /tmp/issue-body.md
            gh issue comment "$EXISTING" --repo "$GITHUB_REPOSITORY" \
              --body "Issue body refreshed for upstream sha \`${SHORT_SHA}\` (new upstream state or updated report format)."
          fi
