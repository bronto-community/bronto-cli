package: api
# output is relative to the invocation cwd, not this config file's location.
# `go generate` runs internal/api/doc.go's directive with cwd=internal/api,
# so this must be just "gen.go" (not "internal/api/gen.go", which would nest
# an extra internal/api/ under internal/api/).
output: gen.go
generate:
  models: true
  client: true

# No include-tags scoping was needed: the full vendored spec (api/openapi.yaml)
# generates cleanly. oapi-codegen did reject three Go-identifier collisions
# caused by deprecated camelCase/snake_case duplicate fields (ExportDetails'
# fromTs/from_ts and toTs/to_ts, and the /usage timeRange/time_range query
# params) both normalizing to the same struct field name. These were fixed
# with small, documented patches directly in api/openapi.yaml (x-go-name on
# the deprecated alias, plus a shared UnixTimestampOrString component schema
# to replace duplicated inline oneOf blocks) rather than by narrowing scope.
# If Plan 6's spec-sync job re-fetches openapi.yaml from upstream, these
# patches will need to be reapplied unless upstream restructures the
# underlying schemas/params itself. Search api/openapi.yaml for
# "bronto-cli vendor patch" to find all three spots.
