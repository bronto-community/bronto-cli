        region: eu
        environment: production
    Metadata:
      type: object
      properties:
        created_at:
          type: integer
          description: Creation timestamp in milliseconds since epoch.
          format: int64
        created_by:
          $ref: '#/components/schemas/Identity'
        modified_at:
          type: integer
          description: Last update timestamp in milliseconds since epoch.
          format: int64
        modified_by:
          $ref: '#/components/schemas/Identity'
        deleted_at:
          type: integer
          description: Deletion timestamp in milliseconds since epoch.
          format: int64
        deleted_by:
          $ref: '#/components/schemas/Identity'
        last_heartbeat_at:
          type: integer
          description: Timestamp of the last heartbeat in milliseconds since epoch.
          format: int64
      description: Common metadata attached to all persisted resources.
    OrganisationSettings:
      type: object
      properties:
        dcr_enabled:
          type: boolean
          description: >-
            True to enable Dynamic Client Registration (DCR) OAuth for MCP
            clients connecting to the server.
        out_of_order:
          type: boolean
          description: >-
            True to enable out of order handling in the system. Note that
            ingestion delay may be added to sort the received events.
        multi_org_group:
          type: string
          description: Default multi org group.
        shared_datasets:
          type: boolean
          description: Whether the shared datasets setting should be enabled on the org.
      additionalProperties: false
    MetricDelta:
      type: object
      properties:
        start_time:
          type: integer
          description: The starting unix time in milliseconds of the previous period.
        end_time:
          type: integer
          description: The ending unix time in milliseconds of the previous period.
        aggregates:
          type: array
          description: Aggregated values for the comparison period.
          items:
            required:
              - function
            type: object
            properties:
              function:
                type: string
                description: the name of the function
              value:
                type: number
                description: the computed value over the delta period
        changes:
          type: array
          description: |
            Change between current and delta period aggregates.
          items:
            required:
              - function
              - value
            type: object
            properties:
              function:
                type: string
                description: the name of the function
              value:
                type: number
                description: Absolute difference.
              factor:
                type: number
                description: Relative delta.
      description: >
        Contains information about the change in the metric aggregations between
        the specified time range  and the delta time range. If the delta time
        range is not specified, the delta is computed against the time range
        immediately preceding the requested one
    Action:
      required:
        - type
      type: object
      properties:
        type:
          type: string
          enum:
            - EMAIL
            - INTEGRATION
        email:
          maxLength: 255
          minLength: 0
          type: string
        integration_id:
          maxLength: 50
          minLength: 0
          type: string
    Template:
      type: object
      properties:
        id:
          type: string
          description: >
