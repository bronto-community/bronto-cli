      summary: Update a user
      description: >
        Updates the specified user's information. Only the fields provided in
        the request body will be modified; other fields will remain unchanged.
        Users can typically update their own profiles, while administrators may
        update any user.
      operationId: updateUser
      parameters:
        - name: userId
          in: path
          description: The unique identifier of the user to update
          required: true
          schema:
            type: string
            format: uuid
          example: 41521f35-1b06-41f0-9cdc-9a938b5739d1
