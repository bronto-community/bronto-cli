    LogView:
      type: object
      properties:
        components:
          type: array
          description: >
            Ordered list of components that make up the view.


            Each component represents a distinct visualization or data
            representation,

            such as a timeline or a list.


            The order of components determines their display order in the UI.
          items:
            required:
              - config
              - type
            type: object
            oneOf:
              - $ref: '#/components/schemas/TimelineComponent'
              - $ref: '#/components/schemas/ListComponent'
      description: |
        A view configuration describing how log data should be presented.
        A view consists of one or more components (e.g. timeline, list),
        each defining a specific way to visualize or explore the data.
    LogsetLog:
      required:
        - log
