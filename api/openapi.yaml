    get:
      summary: Get a time series log based metric by its ID
      operationId: getLbmById
      parameters:
        - name: lbm_id
          in: path
          description: The ID of the LBM to retrieve
          required: true
          schema:
            type: string
        - name: time_range
          in: query
          description: >
            The time period for which to query data. Either `time_range` or both
            `from_ts` and `to_ts`  must be provided. If `time_range` is
            provided, it will take precedence
          required: false
          schema:
            type: string
          example: '''Last 20 minutes'', ''Last 2 hours'', ''Last 3 days'''
        - name: from_ts
          in: query
          description: >
            The starting unix time in milliseconds for which to query data.
            Either `time_range` or both  `from_ts` and `to_ts` must be provided.
            If `time_range` is provided, it will take precedence.
          required: false
          schema:
            type: integer
          example: 1709251200000
        - name: to_ts
          in: query
          description: >
            The ending unix time in milliseconds for which to query data. Either
            `time_range` or both `from_ts` and `to_ts` must be provided. If
            `time_range` is provided, it will take precedence.
          required: false
          schema:
            type: integer
          example: 1711390455601
        - name: limit
          in: query
          description: >
            The maximum number of groups to return. If not provided, the default
            limit is 50. The maximum limit is 100.
          required: false
          schema:
            type: integer
          example: 10
        - name: num_of_slices
          in: query
          description: >
            The num_of_slices parameter defines how the time range is divided
            into intervals.  It is optional, and if not provided, a default
            value is applied. The default number of slices is 1 minute
            granularity for up to 12 hours time range  and 20 minutes
            granularity for longer than 12 hours time range up to 720 slices. -
            default for 20 minutes time window: 20 slices - default for 12 hour
            time window: 720 slices - default for 1 day time window: 72 slices
            (1 slice per 20 minutes) - default for 10 days time window: 720
            slices (1 slice per 20 minutes) - default for 30 days time window:
            720 slices (max number of slices allowed)
          required: false
          schema:
            type: integer
          example: 10
        - name: delta
          in: query
          description: >
            Enables calculation of the difference between the current and
            previous time range values.  When set to true, the response includes
            a delta object with the computed difference and its relative change.
            Defaults to false.
          required: false
          schema:
            type: boolean
          example: true
        - name: delta_time_range
          in: query
          description: >
            The time period for which to query data for delta comparison. Either
            `delta_time_range` or both `delta_from_ts` and `delta_to_ts` can be
            provided if `delta` is enabled. If `delta_time_range` is provided,
            it will take precedence
          required: false
          schema:
            type: string
          example: '''Previous month'', ''Previous quarter'', ''This day last week'''
        - name: delta_from_ts
          in: query
          description: >
