  /timeseries/{metric_definition_id}:
    get:
      tags:
        - timeseries
      summary: Retrieve the timeseries for a metric definition.
      operationId: getTimeseriesFromMetricDefinition
      parameters:
        - name: metric_definition_id
          in: path
          description: The Id of the metric definition to compute the time series for
          required: true
          schema:
            type: string
            format: uuid
          example: 41521f35-1b06-41f0-9cdc-9a938b5739d1
        - name: time_range
          in: query
          description: >
            The relative time range for which to query data. Time range
            supported is from milliseconds to years. For an exact range, use
            `from_ts` and `to_ts` instead.
          schema:
            type: string
          examples:
            sec:
              value: Last 20 minutes
            day:
              value: Last 2 days
            week:
              value: Last 3 weeks
        - name: from_ts
          in: query
          description: >-
            The starting time (unix time in milliseconds) for which to query
            data. Must be used together with `to_ts`. This parameter is
            incompatible with `time_range`.
          schema:
            type: integer
            format: int64
          example: 1709251200000
        - name: to_ts
          in: query
          description: >-
            The ending time (unix time in milliseconds) for which to query data.
            Must be used together with `from_ts`. This parameter is incompatible
            with `time_range`.
          schema:
            type: integer
            format: int64
          example: 1711390455601
        - name: limit
          in: query
          description: In a query with a group by, it limits the number of groups returned.
          schema:
            maximum: 1000
            minimum: 1
            type: integer
            default: 100
          example: 50
        - name: num_of_slices
          in: query
          description: The number of buckets to break the time series results into.
          schema:
            type: integer
            default: 10
          example: 50
        - name: where
          in: query
          description: >-
            The where parameter is used to filter the results of your query. 
            See https://docs.bronto.io/core-features/log-search/query-syntax for
            more details The filter can combine multiple terms using AND, OR,
            NOT.
          schema:
            type: string
          example: ip=10.0.0.1
        - name: delta
          in: query
          description: >
            Enables calculation of the difference between the current and
            previous time range values.  When set to true, the response includes
            a delta object with the computed difference and its relative change.
          required: false
          schema:
            type: boolean
            default: false
          example: true
        - name: delta_time_range
          in: query
          description: >
            The reference time period used for delta comparison. Either
            `delta_time_range` or both `delta_from_ts` and `delta_to_ts` may be
            provided when `delta` is enabled. `delta_time_range` takes
            precedence over `delta_from_ts`/`delta_to_ts` if both are supplied.
            If no delta period is specified, the delta is computed against the
            previous equivalent time range.
          required: false
          schema:
            type: string
          examples:
            previous_month:
              summary: Compare the selected time_range against the previous month
              value: Previous month
            previous_quarter:
              summary: Compare the selected time_range against the previous quarter
              value: Previous quarter
            this_day_last_week:
              summary: Compare the selected time_range against this day last week
              value: This day last week
        - name: delta_from_ts
          in: query
          description: >
            The starting unix time in milliseconds for which to query data for
            delta comparison. Either `delta_time_range` or both `delta_from_ts`
            and `delta_to_ts` may be provided when `delta` is enabled.
            `delta_time_range` takes precedence over
            `delta_from_ts`/`delta_to_ts` if both are supplied. If no delta
            period is specified, the delta is computed against the previous
            equivalent time range.
          required: false
          schema:
            type: integer
          example: 1709251200000
        - name: delta_to_ts
          in: query
          description: >
            The ending unix time in milliseconds for which to query data for
            delta comparison. Either `delta_time_range` or both `delta_from_ts`
            and `delta_to_ts` may be provided when `delta` is enabled.
            `delta_time_range` takes precedence over
            `delta_from_ts`/`delta_to_ts` if both are supplied. If no delta
            period is specified, the delta is computed against the previous
            equivalent time range.
          required: false
          schema:
            type: integer
          example: 1711390455601
      responses:
        '200':
          description: Metric timeseries computed retrieved successfully
          headers:
            RateLimit-Limit:
              $ref: '#/components/headers/RateLimitLimit'
            RateLimit-Remaining:
              $ref: '#/components/headers/RateLimitRemaining'
            RateLimit-Reset:
              $ref: '#/components/headers/RateLimitReset'
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/MetricTimeseries'
                description: Map of the query/formula name and the related timeseries
        '404':
          description: Not Found - The metric definition is not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
