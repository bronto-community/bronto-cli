      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
        - name: entityType
          in: path
          required: true
          schema:
            type: string
            enum:
              - user
              - group
        - name: entityId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              required:
                - roles
                - status
              type: object
              properties:
                roles:
                  type: array
                  description: >
                    List of role IDs to assign. Can be UUIDs (custom roles) or
                    system role IDs like "Admin", "Standard", "ReadOnly",
                    "SearchApi", "IngestionApi", "AdminApi".
                  items:
                    pattern: >-
                      ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}|Admin|Standard|ReadOnly|SearchApi|IngestionApi|AdminApi)$
                    type: string
                status:
                  type: string
                  description: Status of the access grant.
                  enum:
                    - active
                    - invited
        required: true
      responses:
        '204':
          description: Access granted
        '400':
          description: Invalid request
        '500':
          description: Internal server error
