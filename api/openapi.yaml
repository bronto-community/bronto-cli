    TemplateParameter:
      title: ParameterDefinition
      required:
        - type
      type: object
      properties:
        type:
          type: string
          description: >
            The expected data type of the parameter value. The provided argument
            must conform to this type.
          enum:
            - STRING
            - STRING_LIST
            - DOUBLE
            - BOOLEAN
            - OBJECT_LIST
        description:
          type: string
          description: Human-readable explanation of the parameter’s purpose.
      additionalProperties: false
      description: >
        Defines a template parameter. A parameter describes the expected type
        and purpose of a value that must be supplied when the template is
        instantiated.

        This schema represents parameter metadata only. It does not contain
        runtime values.
      example:
        type: STRING
        description: Environment identifier used to scope the deployment.
    WidgetPreview:
