        repo_url:
          type: string
          format: uri
          example: https://github.com/org/meta-service
        version:
          type: string
          example: 1.2.3
        statements:
          type: array
          items:
            $ref: '#/components/schemas/Statement'
    StatementReference:
      type: object
      properties:
