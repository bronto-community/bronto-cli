            properties:
              rel:
                type: string
                description: next
                example: prev
              href:
                type: string
                description: >
                  The URL which can be used to fetch the previous page of
                  results, if it is available. 

                  A "context" stops after a 60 second time interval without any
                  log events.
                format: uri
    Log:
      required:
