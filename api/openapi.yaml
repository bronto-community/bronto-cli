    Export:
      required:
        - bytes
        - events
        - export_id
        - location
        - org_id
        - progress
        - search_details
        - status
      type: object
      properties:
        export_id:
          type: string
          description: The unique identifier for the export.
        org_id:
          type: string
          description: The ID of the organization associated with the export.
        progress:
          type: integer
          description: The progress percentage of the export.
        status:
          type: string
          description: The current status of the export.
          enum:
            - CREATED
            - IN_PROGRESS
            - COMPLETE
        bytes:
          type: integer
          description: The size of the export in bytes.
        events:
          type: integer
          description: The number of events in the export.
        location:
          type: string
          description: The location where the export is stored.
        search_details:
          $ref: '#/components/schemas/ExportDetails'
        created_at:
          type: integer
          description: The timestamp when the export was created.
          format: int64
        modified_at:
          type: integer
          description: The timestamp when the export was last modified.
          format: int64
        failure_detail:
          type: string
          description: >-
            Provides the reason for the failure if the export did not complete
            successfully.
    CreateExportRequest:
      required:
        - search_details
      type: object
      properties:
        search_details:
          $ref: '#/components/schemas/CreateExportDetails'
    Customers:
      required:
        - billing_emails
        - customer_id
        - customer_name
        - org_id
      type: object
      properties:
        customer_id:
          type: string
          description: Unique identifier for the customer
          example: cust_12345
        org_id:
          type: string
          description: Identifier for the organization associated with the customer
          example: org_67890
        customer_name:
          type: string
          description: Name of the customer or company
          example: Acme Inc.
        billing_emails:
          type: array
          description: List of email addresses that receive billing information
          example:
            - billing@acme.com
            - finance@acme.com
          items:
            type: string
            format: email
        contract_type:
          type: string
          description: The type of contract associated with the customer
          example: Enterprise
        ou_id:
          type: string
          description: Organizational Unit (OU) identifier associated with the customer
          example: ou_34567
        parent:
          type: string
          description: Identifier for the parent organization, if applicable
          example: parent_98765
        metadata:
          $ref: '#/components/schemas/Metadata'
        organisations:
          type: array
          description: List of associated organisations
          items:
            type: object
            properties:
              org_id:
                type: string
                description: Unique identifier for the organisation
                example: org_67890
              region:
                type: string
                description: AWS region where the organisation resides
                example: eu-west-1
              name:
                type: string
                description: Human-readable name of the organisation
                example: Acme EU
    Contracts:
      required:
        - billing_provider
        - contract_name
        - contract_status
        - contract_type
        - cost_details
        - limits
      type: object
      properties:
        contract_id:
          type: string
          description: Unique identifier for the contract
          example: cont_98765
        contract_name:
          type: string
          description: Name of the contract
          example: Basic Plan
        contract_type:
          type: string
          description: The type of the contract
          example: Upfront Commit
        contract_status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
            - UNDER_NEGOTIATION
        billing_provider:
          type: string
          enum:
            - STRIPE
            - AWS_MARKETPLACE
        cost_details:
          type: object
          properties:
            currency:
              type: string
              enum:
                - USD
            total_cost:
              type: number
              format: double
            cost_per_gb:
              type: number
              format: double
            overage_cost_per_gb:
              type: number
              format: double
        billing_cCycle_details:
          type: object
          properties:
            billing_cycle:
              type: string
              enum:
                - MONTHLY
                - ANNUALLY
            standard_term:
              type: integer
            term_notes:
              type: string
            starting_at:
              type: integer
              format: int64
            ending_at:
              type: integer
              format: int64
        limits:
          type: object
          properties:
            monthly_log_ingestion:
              type: integer
              format: int64
            retention_period:
              type: string
              enum:
                - ONE_YEAR
                - ONE_MONTH
                - TWO_YEARS
            fair_usage_ratio:
              type: number
              format: double
        subscription_details:
          type: array
          description: Subscription information (Stripe or unknown provider)
          nullable: true
          items:
            $ref: '#/components/schemas/SubscriptionDetails'
        created_at:
          type: integer
          description: Unix timestamp for when the customer was created
          example: 1709645437
        updated_at:
          type: integer
          description: Unix timestamp for when the customer was last updated
          example: 1717594237
