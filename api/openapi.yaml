components:
  schemas:
    ApiKey:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the API key
          format: uuid
        name:
          type: string
          description: The name of the API key
          example: Production API Key
        created_at:
          type: integer
          description: The timestamp when the API key was created
          format: int64
          example: 1710948395538
        api_key:
          type: string
          description: >-
            The first 8 characters of the API key. Note its not possible to
            retrieve the key after creation time.
          example: 2ad85149
        roles:
          type: object
          description: A list of api key role ids
          example:
            - SearchApi
            - IngestionApi
        tags:
          $ref: '#/components/schemas/Tags'
    ErrorResponse:
      required:
        - code
        - correlation_id
        - message
      type: object
      properties:
        code:
          minimum: 200
          type: integer
          description: The http response code.
          format: int32
        correlation_id:
          type: string
          description: The unique identifier for the request.
        message:
          type: string
    CreateApiKeyRequest:
      required:
        - name
        - roles
      type: object
      properties:
        name:
          maxLength: 255
          minLength: 1
          type: string
          description: The name of the API key to create
          example: Production API Key
        roles:
          type: object
          description: A list of api key role ids
          example:
            - IngestionApi
    UpdateApiKeyRequest:
      type: object
      properties:
        name:
          maxLength: 255
          minLength: 1
          type: string
          description: The new name for the API key
          example: Production API Key
        roles:
          type: object
          description: A list of api key role ids
          example:
            - IngestionApi
    User:
      required:
        - email
        - first_name
        - id
        - last_name
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the user
          format: uuid
        first_name:
          type: string
          description: The user's first name
          example: John
        last_name:
          type: string
          description: The user's last name
          example: Doe
        email:
          type: string
          description: The user's email address
          format: email
          example: john@company.com
        roles:
          type: array
          description: A list of role ids
          example:
            - ReadOnly
            - Standard
          items:
            type: string
        last_logins:
          type: object
          additionalProperties:
            type: integer
            description: Unix timestamp representing the last login time for the method.
            format: int64
          description: A map of login methods to their last login timestamps (Unix epoch).
          example:
            Okta: 1731370728
            Password: 1731338939
        login_methods:
          type: object
        tags:
          $ref: '#/components/schemas/Tags'
    CreateUserRequest:
      required:
        - email
        - first_name
        - last_name
        - roles
      type: object
      properties:
        first_name:
          maxLength: 255
          minLength: 1
          type: string
          description: The user's first name
          example: Alice
        last_name:
          maxLength: 255
          minLength: 1
          type: string
          description: The user's last name
          example: Smith
        email:
          type: string
          description: The user's email address
          format: email
          example: alice@company.com
        roles:
          type: array
          description: A list of role ids
          example:
            - Admin,
            - Standard
            - ReadOnly
          items:
            type: string
    UpdateUserRequest:
      type: object
      properties:
        first_name:
          maxLength: 255
          minLength: 1
