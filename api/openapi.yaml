    ForwardConfig:
      required:
        - all_logs
        - compression
        - created_at
        - destination
        - id
        - name
      type: object
      properties:
        id:
          type: string
          description: unique identifier for the config
          format: uuid
        name:
          maxLength: 255
          minLength: 1
          type: string
          description: The name of the config
          example: Archive data to S3
        description:
          maxLength: 1000
          type: string
          description: Extra contextual information to add to the forward config.
          example: Sending data to S3 for long term store
        filter:
          maxLength: 2000
          type: string
          description: Optional filter to forward only some events and discard others
          example: level='ERROR' or level='WARN'
        compression:
          type: string
          description: The compression to use to reduce the payload size
          default: ZSTD
          enum:
            - ZSTD
            - GZIP
            - NONE
        all_logs:
          type: boolean
          description: >-
            True to forward all logs, logs created in future will be
            automatically forwarded
        log_ids:
          maxLength: 250
          type: array
          description: >-
            The list of log ids to forward. Required if all_logs is set to
            false, ignored if all_logs is set to true
          items:
            type: string
        max_payload_size_bytes:
          maximum: 1000000000
          minimum: 1000000
          type: number
          description: >-
            The max size of the payload in bytes, before compression. Payload of
            smaller size can be delivered by the system
          format: int32
          example: 10000000
          default: 10000000
        max_payload_size_events:
          maximum: 1000000000
          minimum: 1000
          type: number
          description: >-
            The max number of log events in a payload. Payloads with less events
            can be delivered by the system
          format: int32
          example: 1000
          default: 1000000
        max_buffer_time_ms:
          maximum: 86400000
          minimum: 60000
          type: number
          description: >-
            The maximum time waited by the system while buffering events to
            build a payload.
          format: int32
          example: 300000
          default: 300000
        destination:
          $ref: '#/components/schemas/ForwardConfigDestination'
        created_at:
          type: integer
          description: The timestamp when the config was created
          format: int64
          example: 1710948395538
    ForwardConfigRequest:
      required:
        - all_logs
        - compression
        - destination
        - name
      type: object
      properties:
        name:
          maxLength: 255
          minLength: 1
          type: string
          description: The name of the config
          example: Archive data to S3
        description:
          maxLength: 1000
          type: string
          description: Extra contextual information to add to the forward config.
          example: Sending data to S3 for long term store
        filter:
          maxLength: 2000
          type: string
          description: Optional filter, to forward only some events and discard others
          example: level='ERROR' or level='WARN'
        compression:
          type: string
          description: >-
            The compression algorithm to use, to reduce the payload size (ZSTD
            recommended)
          default: ZSTD
          enum:
            - ZSTD
            - GZIP
            - NONE
        all_logs:
          type: boolean
          description: >-
            True to forward all logs, logs created in future will be
            automatically forwarded
        log_ids:
          maxLength: 250
          type: array
          description: >-
            The list of log ids to forward. Required if all_logs is set to
            false, ignored if all_logs is set to true
          items:
            type: string
        max_payload_size_bytes:
          maximum: 1000000000
          minimum: 1000000
          type: number
          description: >-
            The max size of the payload in bytes, before compression. Payload of
            smaller size can be delivered by the system
          format: int32
          example: 10000000
          default: 10000000
        max_payload_size_events:
          maximum: 1000000000
          minimum: 1000
          type: number
          description: >-
            The max number of log events in a payload. Payloads with less events
            can be delivered by the system
          format: int32
          example: 1000
          default: 1000000
        max_buffer_time_ms:
          maximum: 86400000
          minimum: 60000
          type: number
          description: >-
            The maximum time waited by the system while buffering events to
            build a payload
          format: int32
          example: 300000
          default: 300000
        destination:
          $ref: '#/components/schemas/ForwardConfigDestination'
    ForwardConfigDestination:
      required:
        - bucket
        - destination_type
      type: object
      properties:
        destination_type:
          type: string
          description: The destination type. Only S3 currently supported
          example: S3
          enum:
            - S3
        bucket:
          maxLength: 255
          type: string
          description: The bucket name
          example: my-archive-bucket
        prefix:
          maxLength: 255
          type: string
          description: The key prefix for S3 objects
          example: bronto/archives/
        storage_class:
          type: string
          description: The S3 storage class to use for the objects
          example: STANDARD
          default: STANDARD
          enum:
            - STANDARD
            - STANDARD_IA
            - GLACIER_IR
    Role:
