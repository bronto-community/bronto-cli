  /patterns:
    post:
      tags:
        - patterns
      summary: Get Pattern templates for logs matching search criteria
      description: >-
        Returns the Pattern IDs, templates, and source log ID for all logs
        matching the given search criteria.
      operationId: postPatterns
      requestBody:
        content:
          application/json:
            schema:
              required:
                - search_details
              type: object
              properties:
                search_details:
                  type: object
                  properties:
                    from:
                      type: array
                      description: List of dataset IDs to search.
                      example:
                        - log-id-1
                        - log-id-2
                      items:
                        type: string
                    from_expr:
                      type: string
                      description: Dataset selector expression.
                      example: environment = 'production'
                  description: One of either `from` or `from_expr` must be specified.
        required: true
      responses:
        '200':
          description: Patterns for all matching logs
          headers:
            RateLimit-Limit:
              $ref: '#/components/headers/RateLimitLimit'
            RateLimit-Remaining:
              $ref: '#/components/headers/RateLimitRemaining'
            RateLimit-Reset:
              $ref: '#/components/headers/RateLimitReset'
          content:
            application/json:
              schema:
                required:
                  - patterns
                type: object
                properties:
                  patterns:
                    type: array
                    items:
                      required:
                        - id
                        - log_id
                        - template
                      type: object
                      properties:
                        id:
                          type: string
                          example: a1b2c3d4e5f60001
                        template:
                          type: string
                          example: Starting listener on port <*>
                        log_id:
                          type: string
                          example: log-id-1
        '400':
          description: Bad Request - The body in the request is invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No datasets matched the given search criteria
        '429':
          description: Too Many Request - Fair usage limits exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error - An error occurred on the server side.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ApiKey:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the API key
          format: uuid
        name:
          type: string
          description: The name of the API key
          example: Production API Key
        api_key:
          type: string
          description: >-
            The first 8 characters of the API key. Note its not possible to
            retrieve the key after creation time.
          example: 2ad85149
        roles:
          type: object
          description: A list of api key role ids
          example:
            - SearchApi
            - IngestionApi
        tags:
          $ref: '#/components/schemas/Tags'
        expires_at:
          type: integer
          description: >-
            The expiration time of the API key, expressed as a Unix timestamp.
            If not set, the key never expires.
          format: int64
          example: 1757000000
        metadata:
          $ref: '#/components/schemas/Metadata'
    ErrorResponse:
      required:
        - code
        - correlation_id
        - details
        - type
      type: object
      properties:
        code:
