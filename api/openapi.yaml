      type: object
      properties:
        log:
          type: string
          description: The name of the log
          example: firewall
        log_id:
          type: string
          description: The unique identifier of the log
          format: uuid
    CollectionDataset:
      required:
        - dataset
        - id
      type: object
      properties:
        dataset:
          type: string
          description: The name of the dataset
          example: firewall
        id:
          type: string
          description: The unique identifier of the dataset
          format: uuid
    CreateOrgRequest:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          description: The name of the organization
          example: Bronto
        region:
          type: string
          description: AWS region where the organisation resides
          example: EU
          enum:
            - EU
            - US
    UpdateOrgRequest:
      type: object
      properties:
        login_methods:
          type: object
        partition_tags:
          required:
            - enabled
          type: object
          properties:
            enabled:
              type: boolean
            partition_tag_list:
              maxItems: 6
              minItems: 0
              uniqueItems: true
              type: array
              description: List of partition tag names
              items:
                type: string
          description: >
            Partition tags allow you to organize the data based on a set of low
            cardinality tags. 

            Good examples of partition tags are: environment, region,
            datacenter, account, cluster, service etc.

            For every combination of the partition tags, a collection will be
            created by concatenating the partition tag values.

            To use partition tags, collection should not be specified in the
            data source.

            The list can be modified at any time but it is a sensitive change
            which may cause the creation of new datasets.
        settings:
          $ref: '#/components/schemas/OrganisationSettings'
    OrgAccessList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrgAccess'
    CreateMonitorRequest:
      required:
        - actions
        - comparison_operator
        - name
        - queries
        - threshold
        - window
      type: object
      properties:
        name:
          maxLength: 255
          minLength: 1
          type: string
          description: The name of the monitor
          example: High Error Rate
        description:
          maxLength: 4000
          minLength: 1
          type: string
          description: Extra contextual information to add to the monitor
          example: Average response time is over 1 seconds in the last 20 minutes
        comparison_operator:
          type: string
          description: >-
            the comparison operator of the monitor (ABOVE, ABOVE_OR_EQUAL,
            BELOW, BELOW_OR_EQUAL, EQUAL, NOT_EQUAL)
          example: ABOVE
          enum:
            - BELOW
            - BELOW_OR_EQUAL
            - ABOVE
            - ABOVE_OR_EQUAL
            - EQUAL
            - NOT_EQUAL
        threshold:
          type: number
          description: the threshold value of the monitor
          example: 1000
        warning_threshold:
          type: number
          description: the warning threshold value
          example: 1000
        window:
          type: string
          description: >-
            The time window to evaluate the monitor; minimum five minutes,
            maximum one day
          example: '''Last 20 minutes'', ''Last 2 hours'', ''Last 1 days'''
        actions:
          maxItems: 10
          minItems: 1
          type: array
          description: >-
            The list of actions (notifications) to take when the monitor fires
            or resolves
          items:
            $ref: '#/components/schemas/Action'
        no_data_status:
          type: string
          description: >-
            Specify the status to use if a group has no data (no events matched
            in a time window)
          example: OK
          enum:
            - OK
            - NO_DATA
            - ALERT
            - WARN
        notify_once:
          type: boolean
          description: >-
            Notify only the groups changing the global monitor status, i.e.
            notifications are sent only for the first group entering ALERT
            status or for the last group resolving
          example: true
          default: false
        group_retention:
          maximum: 604800000
          minimum: 0
          type: integer
          description: Remove groups with no data after the provided time in milliseconds
          format: int64
          example: 600000
        aux:
          maxItems: 10
          type: object
          description: Additional monitor configuration
        mute_until:
          minimum: -1
          type: integer
          description: >-
            Optionally create the monitor already muted, suppressing
            notifications. -1 mutes indefinitely; a future epoch-millis
            timestamp mutes until then. Omit (or 0) to create unmuted.
          format: int64
          example: -1
        type:
          type: string
          default: PATTERN
          enum:
            - PATTERN
            - USAGE
            - CHANGE_DETECTION
        compare_to:
          type: string
          description: >
            For change detection monitors only. How far back in time the
            comparison query should be run. Minimum "5 mins ago", maximum "1
            month".
          example: '''2 hours ago'', ''1 days ago'''
        change_type:
          type: string
          description: >
            For change detection monitors only. Specifies how the change values
            are calculated, as described

            in the [Bronto
            documentation](https://docs.bronto.io/core-features/monitors).
          enum:
            - DIFFERENCE
            - PERCENTAGE
        ai_report_enabled:
          type: boolean
          description: >-
            True if an automatic report should be generated when the monitor
            triggers
        ai_report_instructions:
          type: string
          description: >
            Instructions for the AI on what to include in the report, e.g. check
            for recent deployments, verify the health of the following
            dependencies: ... etc
        formulas:
          maxItems: 1
          minItems: 0
          type: array
          description: List of formulas to use for monitor
          items:
            $ref: '#/components/schemas/Formula'
        queries:
          maxItems: 6
          minItems: 1
          type: array
          description: List of queries to use for monitor
          items:
            $ref: '#/components/schemas/QueryDefinition'
