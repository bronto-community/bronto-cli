            parameters.
          format: uuid
        arguments:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/TemplateArgument'
          description: >
            Map of parameter names to argument bindings. Each key must
            correspond to a parameter defined by the referenced template.
          example:
            from:
              value:
                value: a157b003-d5b8-4333-a3e2-7c7864300852
            region:
              value:
                input: region
    TimelineComponent:
      required:
        - config
        - type
      type: object
      properties:
        type:
          type: string
          enum:
            - timeline
        config:
          type: object
          properties:
            group_by:
              type: string
              description: Field used to group timeline events.
              example: host
    ListComponent:
      required:
        - config
        - type
      type: object
      properties:
        type:
          type: string
          enum:
            - table
        config:
          required:
            - columns
          type: object
          properties:
            columns:
              type: array
              description: |
                Ordered list of columns to display in the table.
                The order of items determines the column order in the UI.
              items:
                required:
                  - name
                type: object
                properties:
                  name:
                    type: string
                    description: Field name in the log dataset.
                  format:
                    type: string
                    description: >-
                      Optional semantic format describing how the field should
                      be interpreted (e.g. duration, bytes, percentage).
                    example: duration
                  base_unit:
                    type: string
                    description: The unit the field’s values are currently expressed in.
                    example: ms
                  target_unit:
                    type: string
                    description: >-
                      The unit to convert the field’s values to for display. If
                      not specified, no conversion is applied.
                    example: s
                  precision:
                    type: integer
                    description: >-
                      Number of decimal places to display when rendering the
                      value. If not specified, a default formatting is applied.
                    example: 2
                    default: 2
                description: |
                  Definition of a single column in the table.
                  Each column maps to a field in the underlying log dataset.
          description: |
            Configuration for the table component, defining how log fields 
            should be displayed in a tabular format.
    OrgAccess:
      type: object
      properties:
        members:
          type: array
          description: List of user and group access entries for the organization
          items:
            type: object
            properties:
              type:
                type: string
                description: Whether this access record is for a user or a group
                enum:
                  - user
                  - group
              id:
                type: string
                description: The user ID or group ID
              roles:
                type: array
                description: List of role IDs or names assigned to the user/group
                items:
                  type: string
              status:
                type: string
                description: Access status (e.g., active, invited, revoked)
              createdAt:
                type: integer
                description: Timestamp of when access was granted (epoch millis)
                format: int64
    Formula:
      required:
        - expression
        - name
      type: object
      properties:
        name:
          type: string
        expression:
          minLength: 2
          type: string
    QueryDefinition:
      required:
        - name
