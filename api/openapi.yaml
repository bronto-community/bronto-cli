    Parser:
      required:
        - id
        - name
        - scope
        - type
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the parser
          format: uuid
        name:
          maxLength: 100
          type: string
          description: The name of the parser
          example: apache
        pattern:
          maxLength: 2000
          type: string
          description: The pattern of the parser
          example: >-
            %{IPV4:client_ip} %{NOTSPACE:ident} %{NOTSPACE:auth}
            \[%{HTTPDATE:timestamp}\] \"(?:%{WORD:verb} %{NOTSPACE:request}(?:
            HTTP/%{NUMBER:httpversion})?|%{DATA:raw_request})\"
            %{NUMBER:response_code} (?:%{NUMBER:bytes}|-) \"%{DATA:referrer}\"
            \"%{DATA:agent}"
        ai_generated:
          type: boolean
          description: true if the pattern was generated using AI tools
        type:
          type: string
          description: type of parser
          enum:
            - GROK
            - DISSECT
            - JAVA
        scope:
          type: string
          description: >-
            Specifics if a parser is global available or private to an
            individual organisation
          enum:
            - SYSTEM
            - ORGANISATION
        log_lines:
          type: array
          description: Original raw log lines
          items:
            type: string
        parsed_lines:
          type: array
          description: Parsed output of each log line
          items:
            type: object
            additionalProperties:
              type: string
            example:
              timestamp: 2025-05-21T12:45:32.000Z
              logLevel: INFO
              thread: main
              logger: com.example.MyClass
              message: Started application
    GenerateParser:
      required:
        - log_id
      type: object
      properties:
        log_id:
          type: string
          description: The unique identifier of the log to generate the parser for.
          format: uuid
        name:
          maxLength: 100
          type: string
          description: The name of the parser.
          example: apache
        description:
          maxLength: 512
          minLength: 8
          type: string
          description: The parser format description
          example: This parser is used to parse web access logs.
    UpdateParser:
      required:
