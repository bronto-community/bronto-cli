version: 2

project_name: bronto

before:
  hooks:
    - go mod tidy
    - sh -c "./scripts/completions.sh"

builds:
  - id: bronto
    main: ./cmd/bronto
    binary: bronto
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/bronto-community/bronto-cli/internal/version.Version={{ .Version }}
      - -X github.com/bronto-community/bronto-cli/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/bronto-community/bronto-cli/internal/version.Date={{ .Date }}

archives:
  - id: bronto
    ids:
      - bronto
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - skill.md
      - llms.txt
      - src: completions/bronto.bash
        dst: completions/bronto.bash
      - src: completions/bronto.zsh
        dst: completions/bronto.zsh
      - src: completions/bronto.fish
        dst: completions/bronto.fish

checksum:
  name_template: checksums.txt

# Keyless (OIDC) cosign signature over the checksums file: verifying one
# signature transitively verifies every archive/package via its checksum.
# Certificate identity is the release workflow itself.
signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes"

# SPDX SBOM per archive (syft), uploaded alongside the release assets.
sboms:
  - artifacts: archive

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

nfpms:
  - id: bronto
    ids:
      - bronto
    package_name: bronto
    vendor: bronto-cli contributors
    homepage: https://github.com/bronto-community/bronto-cli
    maintainer: bronto-cli contributors <noreply@github.com>
    description: Community CLI for the Bronto observability platform.
    license: MIT
    formats:
      - deb
      - rpm
    contents:
      - src: completions/bronto.bash
        dst: /usr/share/bash-completion/completions/bronto
      - src: completions/bronto.zsh
        dst: /usr/share/zsh/site-functions/_bronto
      - src: completions/bronto.fish
        dst: /usr/share/fish/vendor_completions.d/bronto.fish
      - src: LICENSE
        dst: /usr/share/doc/bronto/LICENSE

homebrew_casks:
  - name: bronto
    ids:
      - bronto
    binaries:
      - bronto
    completions:
      bash: completions/bronto.bash
      zsh: completions/bronto.zsh
      fish: completions/bronto.fish
    repository:
      owner: bronto-community
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    # auto = publish on stable tags, skip on pre-releases. HOMEBREW_TAP_TOKEN
    # is minted per-release from the Bronto Community Bot app in release.yml.
    skip_upload: auto
    homepage: https://github.com/bronto-community/bronto-cli
    # No trailing period — brew style rejects it (tap CI runs brew style).
    description: Community CLI for the Bronto observability platform

release:
  github:
    owner: bronto-community
    name: bronto-cli
  draft: false
  prerelease: auto
